<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Bolão 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1F1135; /* Roxo Escuro Profundo (Background Principal) */
            color: #FFFFFF; /* Texto Principal */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        .navbar {
            background-color: #2A1B4E; /* Roxo levemente mais claro (Hierarquia de Superfícies) */
            min-height: 70px;
            border-bottom: 2px solid #00C2C7; /* Linha de destaque em Ciano Vibrante */
        }

        /* Logo fixada absolutamente no centro e no topo */
        .center-logo {
            position: absolute;
            left: 50%;
            top: 10px;
            transform: translateX(-50%);
            z-index: 1050;
        }

        .center-logo img {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            transition: transform 0.3s ease;
            padding: 4px;
            border-radius: 8px;
        }

        .center-logo img:hover {
            transform: scale(1.05);
        }

        .nav-link {
            color: #E5E7EB !important; /* Texto Secundário (Cinza Claro) */
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
            margin-right: 15px;
            transition: all 0.2s ease-in-out;
        }

        .nav-link:hover {
            color: #00C2C7 !important; /* Ciano Vibrante no Hover */
        }

        .nav-link.active {
            color: #00C2C7 !important; /* Ciano Vibrante na Aba Ativa */
            border-bottom: 2px solid #00C2C7;
        }

        /* --- Customização do Dropdown de Perfil --- */
        .profile-trigger img {
            border: 2px solid #00C2C7;
            transition: transform 0.2s;
        }
        .profile-trigger:hover img {
            transform: scale(1.1);
        }
        /* Remove a setinha padrão do dropdown do Bootstrap para ficar mais limpo */
        .dropdown-toggle::after {
            display: none;
        }
        .dropdown-menu-custom {
            background-color: #2A1B4E;
            border: 1px solid #334155;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
        .dropdown-item-custom {
            color: #E5E7EB;
            font-weight: 500;
            padding: 8px 20px;
            transition: all 0.2s;
        }
        .dropdown-item-custom:hover {
            background-color: #1F1135;
            color: #00C2C7;
        }
        .dropdown-item-custom.text-danger:hover {
            color: #E60000 !important;
        }

        /* No mobile, cria uma separação visual e margem para os links */
        @media (max-width: 991px) {
            #menuPrincipal {
                margin-top: 15px;
                border-top: 1px solid #2A1B4E;
                padding-top: 10px;
            }
            .navbar-toggler {
                border-color: #E5E7EB;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm py-2 position-relative">
    <div class="container-fluid px-3 px-md-4">

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="center-logo">
            <a th:href="@{/dashboard}">
                <img th:src="@{/img/logo-copa.png}" alt="Logo Copa 2026" height="80">
            </a>
        </div>

        <div class="dropdown ms-auto order-lg-last order-1">
            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle profile-trigger" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
                <img th:src="@{'https://ui-avatars.com/api/?name=' + ${#authentication.name} + '&background=00C2C7&color=1F1135&bold=true'}" alt="Perfil" width="45" height="45" class="rounded-circle">
            </a>

            <ul class="dropdown-menu dropdown-menu-end dropdown-menu-custom mt-2" aria-labelledby="dropdownUser">
                <li>
                    <span class="dropdown-item-text text-secondary opacity-75 small fw-bold text-uppercase" th:text="${#authentication.name}">usuario@email.com</span>
                </li>
                <li><hr class="dropdown-divider" style="border-color: #334155;"></li>
                <li>
                    <a class="dropdown-item dropdown-item-custom" th:href="@{/usuarios/perfil}">Meu Perfil</a>
                </li>
                <li>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="dropdown-item dropdown-item-custom text-danger fw-bold">Sair</button>
                    </form>
                </li>
            </ul>
        </div>

        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/selecoes}">Seleções</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/partidas}">Partidas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/usuarios}">Usuários</a>
                </li>
            </ul>
        </div>

    </div>
</nav>

<main class="container-fluid py-4 px-md-5">
    <div th:replace="${content}"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

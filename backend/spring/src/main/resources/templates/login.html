<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Bolão Copa 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f4f9;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .page-title {
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Contêiner principal com max-width para não quebrar em monitores ultrawide */
        .login-container {
            max-width: 900px;
            width: 100%;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Coluna da esquerda (Formulário) */
        .form-section {
            padding: 50px;
        }
        .form-section h2 {
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }

        /* Coluna da direita (Imagens) */
        .image-section {
            position: relative;
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1a1a1a;
            overflow: hidden;
            border-radius: 16px;
        }

        /* Efeito de Blur no fundo */
        .bg-blur {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-image: url('/img/bg-copa.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(8px);
            opacity: 0.6;
            z-index: 1;
        }

        /* Logo nítida sobreposta */
        .logo-overlay {
            position: relative;
            z-index: 2;
            max-width: 60%;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.5));
        }

        .btn-primary {
            background-color: #0056b3;
            border: none;
            padding: 12px;
            font-size: 16px;
        }
        .btn-primary:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>

<h1 class="page-title fs-3">Gestão do Bolão da Copa do Mundo 2026</h1>

<div class="container p-3">
    <div class="row login-container mx-auto">

        <div class="col-12 col-md-6 form-section d-flex flex-column justify-content-center">
            <h2>Acesso ao Sistema</h2>

            <div th:if="${param.error}" class="alert alert-danger py-2">
                E-mail ou senha inválidos.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2">
                Sessão encerrada com sucesso.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label text-muted">E-mail</label>
                    <input type="email" class="form-control form-control-lg" id="username" name="username" required autofocus placeholder="exemplo@unialfa.edu.br">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label text-muted">Senha</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password" required placeholder="Digite sua senha">
                </div>

                <button type="submit" class="btn btn-primary w-100 rounded-3">Entrar</button>
            </form>
        </div>

        <div class="col-md-6 d-none d-md-flex image-section p-0">
            <div class="bg-blur"></div>
            <img th:src="@{/img/logo-copa.png}" alt="Logo Copa 2026" class="logo-overlay img-fluid">
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bolão Copa 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* --- PADRÃO MOBILE (Telas Pequenas) --- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* No celular, usa a bg-copa.jpg */
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url('/img/bg-copa.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(8px);
            transform: scale(1.05);
            z-index: -1;
        }

        .image-section {
            /* No celular, a coluna da direita fica totalmente oculta */
            display: none;
            position: relative;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        .form-section {
            padding: 30px;
        }

        /* --- PADRÃO DESKTOP (A partir de 768px de largura) --- */
        @media (min-width: 768px) {
            body::before {
                /* No desktop, volta para a bg-body.webp */
                background-image:
                    linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                    url('/img/bg-body.webp');
            }

            .form-section {
                padding: 50px;
            }

            .image-section {
                /* No desktop, a coluna da direita aparece perfeitamente */
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .page-title {
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .login-container {
            max-width: 900px;
            width: 100%;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .form-section h2 {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 25px;
        }

        .form-control-lg {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            padding: 14px 20px;
            transition: all 0.3s ease;
        }

        .form-control-lg:focus {
            background-color: #ffffff;
            border-color: #0056b3;
            box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.15);
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 8px;
        }

        .btn-primary {
            background: linear-gradient(to right, #0056b3, #004494);
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(0, 86, 179, 0.3);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: linear-gradient(to right, #004494, #003377);
            box-shadow: 0 6px 15px rgba(0, 86, 179, 0.4);
            transform: translateY(-2px);
        }

        .bg-blur {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-image: url('/img/bg-copa.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(8px);
            opacity: 0.6;
            z-index: 1;
        }

        .logo-overlay {
            position: relative;
            z-index: 2;
            max-width: 50%;
            filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.6));
            transition: transform 0.4s ease;
        }

        .image-section:hover .logo-overlay {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<h1 class="page-title fs-3 mt-md-0 mt-4">Gestão do Bolão<br class="d-md-none"> da Copa do Mundo 2026</h1>

<div class="container p-3">
    <div class="row login-container mx-auto">

        <div class="col-12 col-md-6 form-section d-flex flex-column justify-content-center">
            <h2>Acesso ao Sistema</h2>

            <div th:if="${param.error}" class="alert alert-danger py-2 border-0 rounded-3">
                E-mail ou senha inválidos.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2 border-0 rounded-3">
                Sessão encerrada com sucesso.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">E-mail</label>
                    <input type="email" class="form-control form-control-lg" id="username" name="username" required autofocus placeholder="exemplo@unialfa.edu.br">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password" required placeholder="Digite sua senha">
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-2">Entrar</button>
            </form>
        </div>

        <div class="col-md-6 image-section p-0">
            <div class="bg-blur"></div>
            <img th:src="@{/img/logo-copa.png}" alt="Logo Copa 2026" class="logo-overlay img-fluid">
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

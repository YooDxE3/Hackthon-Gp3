<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
  <style>
    @media (min-width: 992px) {
        .dash-container { max-width: 1200px; margin: 0 auto; }
    }

    /* Superfícies e Textos (Tema Claro) */
    .card-custom {
        background-color: #F8F9FA !important;
        border: 1px solid #E5E7EB;
        border-radius: 12px;
    }

    .text-primary-custom { color: #1F2937 !important; } /* Cinza Escuro */
    .text-secondary-custom { color: #6B7280 !important; } /* Cinza Médio */
    .text-cyan { color: #009B9F !important; } /* Ciano adaptado para fundo claro */

    .btn-cyan { background-color: #00C2C7; color: #1F1135; font-weight: bold; border: none; }
    .btn-cyan:hover { background-color: #009b9f; color: #1F1135; }

    .btn-edit { background-color: transparent; border: 1px solid #009B9F; color: #009B9F; transition: all 0.2s; }
    .btn-edit:hover { background-color: #009B9F; color: #FFFFFF; }

    .btn-delete { background-color: transparent; border: 1px solid #DC2626; color: #DC2626; transition: all 0.2s; }
    .btn-delete:hover { background-color: #DC2626; color: #FFFFFF; }

    /* Container da Bandeira ajustado para fundo claro */
    .flag-container {
        width: 110px;
        height: 75px;
        background-color: #FFFFFF;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border: 1px solid #D1D5DB;
    }
    .flag-container img { width: 100%; height: 100%; object-fit: cover; }

    /* Estilo da Barra de Filtros Clara */
    .filter-bar {
        background-color: #F8F9FA;
        border: 1px solid #E5E7EB;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 25px;
    }

    /* Inputs do filtro claros */
    .form-control-light {
        background-color: #FFFFFF;
        border: 1px solid #D1D5DB;
        color: #1F2937;
    }
    .form-control-light:focus {
        background-color: #FFFFFF;
        color: #1F2937;
        border-color: #009B9F;
        box-shadow: 0 0 0 0.25rem rgba(0, 194, 199, 0.15);
        outline: none;
    }
  </style>

  <div class="dash-container">

    <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
      <h1 class="h3 fw-bold text-primary-custom">Seleções</h1>
      <a th:href="@{/selecoes/novo}" class="btn btn-cyan rounded-pill px-4">Novo</a>
    </div>

    <form th:action="@{/selecoes}" method="get" class="filter-bar d-flex flex-column flex-md-row gap-4 align-items-md-center shadow-sm">

      <div class="d-flex align-items-center gap-2">
        <label for="grupo" class="text-secondary-custom fw-bold mb-0">Grupo:</label>
        <select name="grupo" id="grupo" class="form-select form-control-light w-auto">
          <option value="">Todos os Grupos</option>
          <option th:each="g : ${grupos}" th:value="${g}" th:text="'Grupo ' + ${g}" th:selected="${paramGrupo != null and paramGrupo.name() == g.name()}"></option>
        </select>
      </div>

      <div class="d-flex align-items-center gap-2 flex-grow-1">
        <label for="ordem" class="text-secondary-custom fw-bold mb-0">Ordenação:</label>
        <select name="ordem" id="ordem" class="form-select form-control-light w-auto">
          <option value="ASC" th:selected="${paramOrdem == 'ASC'}">Grupo (A a Z)</option>
          <option value="DESC" th:selected="${paramOrdem == 'DESC'}">Grupo (Z a A)</option>
        </select>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-secondary px-4 fw-bold">Filtrar</button>
        <a th:href="@{/selecoes}" th:if="${paramGrupo != null or paramOrdem != 'ASC'}" class="btn btn-outline-secondary px-3">Limpar</a>
      </div>
    </form>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

      <div class="col" th:each="s : ${selecoes}">
        <div class="card card-custom h-100 shadow-sm p-3">
          <div class="d-flex w-100">

            <div class="d-flex flex-column align-items-start me-3">
              <span class="text-secondary-custom fw-bold small mb-2" th:text="${s.codigoFifa}">COD</span>
              <div class="flag-container shadow-sm">
                <img th:if="${s.escudoUrl != null and !s.escudoUrl.isEmpty()}" th:src="${s.escudoUrl}" alt="Bandeira">
                <span th:unless="${s.escudoUrl != null and !s.escudoUrl.isEmpty()}" class="text-secondary-custom small">Sem imagem</span>
              </div>
            </div>

            <div class="d-flex flex-column justify-content-between w-100">
              <div>
                <h5 class="fw-bold text-primary-custom mb-1" th:text="${s.nome}">Nome</h5>
                <p class="text-secondary-custom mb-0 small">Grupo: <span class="text-cyan fw-bold fs-6" th:text="${s.grupo != null ? s.grupo : '---'}">X</span></p>
              </div>

              <div class="d-flex justify-content-end gap-2 mt-3">
                <a th:href="@{/selecoes/{id}(id=${s.id})}" class="btn btn-sm btn-edit rounded-pill px-3">Editar</a>
                <a th:href="@{/selecoes/remover/{id}(id=${s.id})}" class="btn btn-sm btn-delete rounded-pill px-3" onclick="return confirm('Tem certeza que deseja excluir esta seleção?');">Excluir</a>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>

    <div th:if="${#lists.isEmpty(selecoes)}" class="text-center mt-5">
      <p class="text-secondary-custom fs-5">Nenhuma seleção encontrada para este filtro.</p>
    </div>

  </div>
</section>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
  <h1 class="mb-3">Seleções</h1>
  <a th:href="@{/selecoes/novo}" class="btn btn-primary mb-3">Nova seleção</a>
  <table class="table table-striped">
    <thead>
    <tr><th>ID</th><th>Nome</th><th>Código FIFA</th><th>Grupo</th><th>Ações</th></tr>
    </thead>
    <tbody>
    <tr th:each="s : ${selecoes}">
      <td th:text="${s.id}"></td>
      <td th:text="${s.nome}"></td>
      <td th:text="${s.codigoFifa}"></td>
      <td th:text="${s.grupo}"></td>
      <td>
        <a th:href="@{/selecoes/{id}(id=${s.id})}" class="btn btn-sm btn-secondary">Editar</a>
        <a th:href="@{/selecoes/remover/{id}(id=${s.id})}" class="btn btn-sm btn-danger">Remover</a>
      </td>
    </tr>
    </tbody>
  </table>
</section>
</body>
</html>

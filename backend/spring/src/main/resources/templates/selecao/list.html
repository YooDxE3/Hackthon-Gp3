<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Selecoes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
<h1 class="mb-3">Selecoes</h1>
<a th:href="@{/selecoes/novo}" class="btn btn-primary mb-3">Nova selecao</a>
<table class="table table-striped">
  <thead>
  <tr><th>ID</th><th>Nome</th><th>Codigo FIFA</th><th>Grupo</th><th>Acoes</th></tr>
  </thead>
  <tbody>
  <tr th:each="s : ${selecoes}">
    <td th:text="${s.id}"></td>
    <td th:text="${s.nome}"></td>
    <td th:text="${s.codigoFifa}"></td>
    <td th:text="${s.grupo}"></td>
    <td>
      <a th:href="@{/selecoes/{id}(id=${s.id})}" class="btn btn-sm btn-secondary">Editar</a>
      <a th:href="@{/selecoes/remover/{id}(id=${s.id})}" class="btn btn-sm btn-danger">Remover</a>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>

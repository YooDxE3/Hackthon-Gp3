<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
    <style>
        @media (min-width: 992px) {
            .dash-container { max-width: 800px; margin: 0 auto; }
        }

        .card-custom { background-color: #2A1B4E !important; border: none; border-radius: 12px; }
        .text-primary-custom { color: #FFFFFF !important; }
        .text-secondary-custom { color: #E5E7EB !important; }

        /* Inputs escuros com borda Ciano no foco */
        .form-control-custom {
            background-color: #1F1135;
            border: 1px solid #334155;
            color: #FFFFFF;
            border-radius: 8px;
            padding: 12px;
        }
        .form-control-custom:focus {
            background-color: #1F1135;
            color: #FFFFFF;
            border-color: #00C2C7;
            box-shadow: 0 0 0 0.25rem rgba(0, 194, 199, 0.25);
        }
        .form-control-custom::placeholder {
            color: #64748b;
        }

        /* Cores do Guia para os botões do form */
        .btn-success-custom { background-color: #A9D700; color: #1F1135; font-weight: bold; border: none; transition: 0.2s;}
        .btn-success-custom:hover { background-color: #8db500; color: #1F1135; transform: translateY(-2px); }

        .btn-secondary-custom { background-color: transparent; border: 1px solid #E5E7EB; color: #E5E7EB; transition: 0.2s;}
        .btn-secondary-custom:hover { background-color: #E5E7EB; color: #1F1135; }
    </style>

    <div class="dash-container">

        <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
            <h1 class="h3 fw-bold text-primary-custom">Cadastro de Seleção</h1>
        </div>

        <div class="card card-custom shadow-sm">
            <div class="card-body p-4 p-md-5">

                <form th:action="@{/selecoes/salvar}" th:object="${selecao}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-4">
                        <div class="col-md-8">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">Nome</label>
                            <input type="text" class="form-control form-control-custom" th:field="*{nome}" required placeholder="Ex: Brasil">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">Código FIFA</label>
                            <input type="text" class="form-control form-control-custom" th:field="*{codigoFifa}" maxlength="3" required placeholder="Ex: BRA" style="text-transform: uppercase;">
                        </div>

                        <div class="col-md-8">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">Escudo (URL)</label>
                            <input type="text" class="form-control form-control-custom" th:field="*{escudoUrl}" placeholder="https://link.com/bandeira.png">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">Grupo</label>
                            <select class="form-select form-select-custom" th:field="*{grupo}" required>
                                <option value="">Selecione...</option>
                                <option th:each="g : ${T(hackthon.grupo3.spring.model.enums.Grupo).values()}"
                                        th:value="${g}" th:text="'Grupo ' + ${g}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-3 mt-5">
                        <a th:href="@{/selecoes}" class="btn btn-secondary-custom rounded-pill px-4 py-2">Cancelar</a>
                        <button type="submit" class="btn btn-success-custom rounded-pill px-5 py-2">Salvar</button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</section>
</body>
</html>

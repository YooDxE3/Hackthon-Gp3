<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
    <div class="card shadow-sm col-md-6 mx-auto mt-4">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Cadastro de Seleção</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/selecoes/salvar}" th:object="${selecao}" method="post">
                <input type="hidden" th:field="*{id}">
                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" class="form-control" th:field="*{nome}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Código FIFA</label>
                    <input type="text" class="form-control" th:field="*{codigoFifa}" maxlength="3" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Escudo (URL)</label>
                    <input type="text" class="form-control" th:field="*{escudoUrl}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Grupo</label>
                    <input type="text" class="form-control" th:field="*{grupo}" maxlength="2">
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/selecoes}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>

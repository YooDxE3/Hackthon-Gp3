<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Selecao</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
<h1 class="mb-3">Selecao</h1>
<form th:action="@{/selecoes/salvar}" th:object="${selecao}" method="post">
    <input type="hidden" th:field="*{id}">
    <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" class="form-control" th:field="*{nome}">
    </div>
    <div class="mb-3">
        <label class="form-label">Codigo FIFA</label>
        <input type="text" class="form-control" th:field="*{codigoFifa}" maxlength="3">
    </div>
    <div class="mb-3">
        <label class="form-label">Escudo (URL)</label>
        <input type="text" class="form-control" th:field="*{escudoUrl}">
    </div>
    <div class="mb-3">
        <label class="form-label">Grupo</label>
        <input type="text" class="form-control" th:field="*{grupo}" maxlength="2">
    </div>
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a th:href="@{/selecoes}" class="btn btn-secondary">Cancelar</a>
</form>
</body>
</html>

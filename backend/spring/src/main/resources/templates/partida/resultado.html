<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
    <style>
        @media (min-width: 992px) { .dash-container { max-width: 600px; margin: 0 auto; } }

        .card-custom { background-color: #2A1B4E !important; border: none; border-radius: 12px; }
        .text-primary-custom { color: #FFFFFF !important; }
        .text-secondary-custom { color: #E5E7EB !important; }
        .text-cyan { color: #00C2C7 !important; }

        /* Input de Placares gigante */
        .score-input {
            background-color: #1F1135;
            border: 2px solid #334155;
            color: #FFFFFF;
            border-radius: 12px;
            font-size: 40px !important;
            font-weight: 800;
            width: 100px !important;
            height: 100px;
            text-align: center;
        }
        .score-input:focus {
            background-color: #1F1135;
            color: #FFFFFF;
            border-color: #00C2C7;
            box-shadow: 0 0 15px rgba(0, 194, 199, 0.4);
            outline: none;
        }

        /* Remove setinhas dos inputs number */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .btn-success-custom { background-color: #A9D700; color: #1F1135; font-weight: bold; border: none; transition: 0.2s;}
        .btn-success-custom:hover { background-color: #8db500; color: #1F1135; transform: translateY(-2px); }
        .btn-secondary-custom { background-color: transparent; border: 1px solid #E5E7EB; color: #E5E7EB; transition: 0.2s;}
        .btn-secondary-custom:hover { background-color: #E5E7EB; color: #1F1135; }
    </style>

    <div class="dash-container">

        <div class="d-flex justify-content-center align-items-center mb-4 mt-2">
            <h1 class="h3 fw-bold text-primary-custom">Encerrar Partida</h1>
        </div>

        <div class="card card-custom shadow-lg">
            <div class="card-body p-5">

                <div class="text-center mb-5 border-bottom border-secondary pb-4">
                    <span class="badge bg-cyan text-dark px-3 py-2 rounded-pill fw-bold mb-2" th:text="${partida.fase}">FASE</span>
                    <p class="text-secondary-custom mb-0 mt-2" th:text="${#temporals.format(partida.dataHora, 'dd/MM/yyyy HH:mm')} + ' - ' + ${partida.estadio}"></p>
                </div>

                <form th:action="@{/partidas/{id}/resultado(id=${partida.id})}" method="post">

                    <div class="d-flex align-items-center justify-content-center gap-4 mb-5">

                        <div class="text-center" style="width: 150px;">
                            <h5 class="fw-bold text-primary-custom text-truncate mb-3" th:text="${partida.mandante.nome}">Mandante</h5>
                            <input type="number" name="golsMandante" class="form-control score-input mx-auto" required min="0" th:value="${partida.golsMandante}">
                        </div>

                        <div class="text-secondary-custom opacity-50 display-6 fw-bold">X</div>

                        <div class="text-center" style="width: 150px;">
                            <h5 class="fw-bold text-primary-custom text-truncate mb-3" th:text="${partida.visitante.nome}">Visitante</h5>
                            <input type="number" name="golsVisitante" class="form-control score-input mx-auto" required min="0" th:value="${partida.golsVisitante}">
                        </div>

                    </div>

                    <div class="d-flex justify-content-center gap-3 mt-4">
                        <a th:href="@{/partidas}" class="btn btn-secondary-custom rounded-pill px-4 py-2">Voltar</a>
                        <button type="submit" class="btn btn-success-custom rounded-pill px-5 py-2">Salvar Resultado Final</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</section>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lancar resultado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4" style="max-width: 520px;">
<h1 class="h4 mb-4">Lancar resultado</h1>

<form th:action="@{/partidas/{id}/resultado(id=${partida.id})}" method="post">
    <div class="row align-items-end g-3">
        <div class="col">
            <label class="form-label" th:text="${partida.mandante.nome}">Mandante</label>
            <input type="number" name="golsMandante" min="0" class="form-control"
                   th:value="${partida.golsMandante}" required>
        </div>
        <div class="col-auto pb-2">x</div>
        <div class="col">
            <label class="form-label" th:text="${partida.visitante.nome}">Visitante</label>
            <input type="number" name="golsVisitante" min="0" class="form-control"
                   th:value="${partida.golsVisitante}" required>
        </div>
    </div>
    <div class="mt-4">
        <button type="submit" class="btn btn-primary">Lancar e calcular</button>
        <a th:href="@{/partidas}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
</body>
</html>

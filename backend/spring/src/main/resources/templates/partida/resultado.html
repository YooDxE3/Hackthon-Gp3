<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
    <div class="card shadow-sm col-md-8 mx-auto mt-4">
        <div class="card-header bg-dark text-white text-center">
            <h4 class="mb-0">Lançar Resultado da Partida</h4>
        </div>
        <div class="card-body">

            <div class="text-center mb-4">
                <span class="badge bg-primary" th:text="${partida.fase}">FASE</span>
                <p class="text-muted mt-2" th:text="${#temporals.format(partida.dataHora, 'dd/MM/yyyy HH:mm')} + ' - ' + ${partida.estadio}"></p>
            </div>

            <form th:action="@{/partidas/{id}/resultado(id=${partida.id})}" method="post">
                <div class="row align-items-center justify-content-center text-center mb-4">

                    <div class="col-4">
                        <h5 th:text="${partida.mandante.nome}">Mandante</h5>
                        <input type="number" name="golsMandante" class="form-control form-control-lg text-center mx-auto mt-2"
                               style="width: 80px; font-size: 24px;" required min="0" th:value="${partida.golsMandante}">
                    </div>

                    <div class="col-2">
                        <h3 class="text-muted">X</h3>
                    </div>

                    <div class="col-4">
                        <h5 th:text="${partida.visitante.nome}">Visitante</h5>
                        <input type="number" name="golsVisitante" class="form-control form-control-lg text-center mx-auto mt-2"
                               style="width: 80px; font-size: 24px;" required min="0" th:value="${partida.golsVisitante}">
                    </div>
                </div>

                <div class="d-flex justify-content-center gap-2 mt-4">
                    <a th:href="@{/partidas}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Encerrar Partida</button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>

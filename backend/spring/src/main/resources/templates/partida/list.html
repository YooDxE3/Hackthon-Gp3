<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
    <style>
        @media (min-width: 992px) { .dash-container { max-width: 1200px; margin: 0 auto; } }

        .card-custom { background-color: #2A1B4E !important; border: none; border-radius: 12px; }
        .text-primary-custom { color: #FFFFFF !important; }
        .text-secondary-custom { color: #E5E7EB !important; }
        .text-cyan { color: #00C2C7 !important; }

        .btn-cyan { background-color: #00C2C7; color: #1F1135; font-weight: bold; border: none; }
        .btn-cyan:hover { background-color: #009b9f; color: #1F1135; }

        .btn-edit { background-color: transparent; border: 1px solid #00C2C7; color: #00C2C7; transition: 0.2s; }
        .btn-edit:hover { background-color: #00C2C7; color: #1F1135; }

        .btn-delete { background-color: transparent; border: 1px solid #E60000; color: #E60000; transition: 0.2s; }
        .btn-delete:hover { background-color: #E60000; color: #FFFFFF; }

        .btn-result { background-color: transparent; border: 1px solid #FFD700; color: #FFD700; transition: 0.2s; }
        .btn-result:hover { background-color: #FFD700; color: #1F1135; }

        /* Estrutura visual do confronto (Bandeiras e X) */
        .match-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1F1135;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #334155;
        }

        .flag-box {
            width: 60px;
            height: 40px;
            background-color: #2A1B4E;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flag-box img { width: 100%; height: 100%; object-fit: cover; }

        .team-name {
            color: #FFFFFF;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Barra de Filtros (Visual) */
        .filter-bar {
            background-color: #2A1B4E;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .form-control-dark {
            background-color: #1F1135;
            border: 1px solid #334155;
            color: #FFFFFF;
        }
        .form-control-dark:focus { background-color: #1F1135; color: #FFFFFF; border-color: #00C2C7; box-shadow: none;}
    </style>

    <div class="dash-container">

        <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
            <h1 class="h3 fw-bold text-primary-custom">Partidas</h1>
            <a th:href="@{/partidas/novo}" class="btn btn-cyan rounded-pill px-4">Nova Partida</a>
        </div>

        <div class="filter-bar d-flex flex-column flex-md-row gap-3">
            <input type="text" class="form-control form-control-dark" placeholder="Pesquisa por país...">
            <select class="form-select form-control-dark w-auto">
                <option value="">Todos os Status</option>
                <option value="AGENDADA">Agendadas</option>
                <option value="EM_ANDAMENTO">Em Andamento</option>
                <option value="ENCERRADA">Encerradas</option>
            </select>
            <button class="btn btn-secondary px-4">Filtrar</button>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">

            <div class="col" th:each="p : ${partidas}">
                <div class="card card-custom h-100 shadow-sm p-3">

                    <div class="match-container">
                        <div class="d-flex flex-column align-items-center" style="width: 35%;">
                            <div class="flag-box">
                                <img th:if="${p.mandante?.escudoUrl != null}" th:src="${p.mandante.escudoUrl}" alt="Mandante">
                            </div>
                            <div class="team-name text-truncate w-100" th:title="${p.mandante?.nome}" th:text="${p.mandante?.nome ?: 'A Definir'}">Time A</div>
                        </div>

                        <div class="fw-bolder text-secondary-custom fs-5">X</div>

                        <div class="d-flex flex-column align-items-center" style="width: 35%;">
                            <div class="flag-box">
                                <img th:if="${p.visitante?.escudoUrl != null}" th:src="${p.visitante.escudoUrl}" alt="Visitante">
                            </div>
                            <div class="team-name text-truncate w-100" th:title="${p.visitante?.nome}" th:text="${p.visitante?.nome ?: 'A Definir'}">Time B</div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-end mb-4 px-2">
                        <div>
                            <div class="text-secondary-custom small mb-1">Data: <span class="text-primary-custom" th:text="${#temporals.format(p.dataHora, 'dd/MM/yyyy HH:mm')}">--/--/--</span></div>
                            <div class="text-secondary-custom small mb-1">Fase: <span class="text-cyan fw-bold" th:text="${p.fase}">---</span></div>
                        </div>
                        <div class="text-end">
                            <span class="badge rounded-pill"
                                  th:classappend="${p.status.name() == 'ENCERRADA' ? 'bg-success' : (p.status.name() == 'EM_ANDAMENTO' ? 'bg-warning text-dark' : 'bg-info text-dark')}"
                                  th:text="${p.status}">STATUS</span>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between gap-2 mt-auto">
                        <a th:href="@{/partidas/{id}/resultado(id=${p.id})}" class="btn btn-sm btn-result rounded-pill flex-grow-1">Resultado</a>
                        <a th:href="@{/partidas/{id}(id=${p.id})}" class="btn btn-sm btn-edit rounded-pill px-3">Editar</a>
                        <a th:href="@{/partidas/remover/{id}(id=${p.id})}" class="btn btn-sm btn-delete rounded-pill px-3" onclick="return confirm('Excluir partida?');">Remover</a>
                    </div>

                </div>
            </div>

        </div>

    </div>
</section>
</body>
</html>

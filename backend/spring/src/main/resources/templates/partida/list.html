<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
    <style>
        @media (min-width: 992px) { .dash-container { max-width: 1200px; margin: 0 auto; } }

        /* Superfícies e Textos (Tema Claro) */
        .card-custom {
            background-color: #F8F9FA !important;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
        }
        .text-primary-custom { color: #1F2937 !important; } /* Cinza Escuro */
        .text-secondary-custom { color: #6B7280 !important; } /* Cinza Médio */
        .text-cyan { color: #009B9F !important; } /* Ciano adaptado */

        /* Botões */
        .btn-cyan { background-color: #00C2C7; color: #1F1135; font-weight: bold; border: none; }
        .btn-cyan:hover { background-color: #009b9f; color: #1F1135; }

        .btn-edit { background-color: transparent; border: 1px solid #009B9F; color: #009B9F; transition: 0.2s; }
        .btn-edit:hover { background-color: #009B9F; color: #FFFFFF; }

        .btn-delete { background-color: transparent; border: 1px solid #DC2626; color: #DC2626; transition: 0.2s; }
        .btn-delete:hover { background-color: #DC2626; color: #FFFFFF; }

        /* Dourado mais escuro para garantir leitura no fundo branco */
        .btn-result { background-color: transparent; border: 1px solid #D4AF37; color: #D4AF37; transition: 0.2s; font-weight: 600;}
        .btn-result:hover { background-color: #D4AF37; color: #FFFFFF; }

        /* Container do Placar e Bandeiras */
        .match-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #FFFFFF; /* Fundo branco interno */
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #E5E7EB;
        }

        .flag-box {
            width: 60px;
            height: 40px;
            background-color: #F8F9FA;
            border: 1px solid #D1D5DB;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flag-box img { width: 100%; height: 100%; object-fit: cover; }

        .team-name {
            color: #1F2937; /* Cor escura do tema claro */
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Barra de Filtros Clara */
        .filter-bar {
            background-color: #F8F9FA;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .form-control-light {
            background-color: #FFFFFF;
            border: 1px solid #D1D5DB;
            color: #1F2937;
        }
        .form-control-light:focus {
            background-color: #FFFFFF;
            color: #1F2937;
            border-color: #009B9F;
            box-shadow: 0 0 0 0.25rem rgba(0, 194, 199, 0.15);
            outline: none;
        }
    </style>

    <div class="dash-container">

        <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
            <h1 class="h3 fw-bold text-primary-custom">Partidas</h1>
            <a th:href="@{/partidas/novo}" class="btn btn-cyan rounded-pill px-4">Nova Partida</a>
        </div>

        <form th:action="@{/partidas}" method="get" class="filter-bar d-flex flex-column flex-lg-row gap-4 align-items-lg-center shadow-sm">

            <div class="d-flex align-items-center gap-2">
                <label for="fase" class="text-secondary-custom fw-bold mb-0">Fase:</label>
                <select name="fase" id="fase" class="form-select form-control-light w-auto">
                    <option value="">Todas</option>
                    <option th:each="f : ${fases}" th:value="${f}" th:text="${f.descricao}" th:selected="${paramFase != null and paramFase.name() == f.name()}"></option>
                </select>
            </div>

            <div class="d-flex align-items-center gap-2">
                <label for="status" class="text-secondary-custom fw-bold mb-0">Status:</label>
                <select name="status" id="status" class="form-select form-control-light w-auto">
                    <option value="" th:selected="${paramStatus == null}">Todos</option>
                    <option value="AGENDADA" th:selected="${paramStatus?.name() == 'AGENDADA'}">Agendadas</option>
                    <option value="EM_ANDAMENTO" th:selected="${paramStatus?.name() == 'EM_ANDAMENTO'}">Em Andamento</option>
                    <option value="ENCERRADA" th:selected="${paramStatus?.name() == 'ENCERRADA'}">Encerradas</option>
                </select>
            </div>

            <div class="d-flex align-items-center gap-2 flex-grow-1">
                <label for="paisId" class="text-secondary-custom fw-bold mb-0">País:</label>
                <select name="paisId" id="paisId" class="form-select form-control-light w-100">
                    <option value="">Todos os Países</option>
                    <option th:each="s : ${selecoes}" th:value="${s.id}" th:text="${s.nome}" th:selected="${paramPais == s.id}"></option>
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-secondary px-4 fw-bold">Filtrar</button>
                <a th:href="@{/partidas}" th:if="${paramPais != null or paramFase != null or paramStatus != null}" class="btn btn-outline-secondary px-3">Limpar</a>
            </div>
        </form>

        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">

            <div class="col" th:each="p : ${partidas}">
                <div class="card card-custom h-100 shadow-sm p-3">

                    <div class="match-container">

                        <div class="d-flex flex-column align-items-center" style="width: 35%;">
                            <div class="flag-box">
                                <img th:if="${p.mandante?.escudoUrl != null}" th:src="${p.mandante.escudoUrl}" alt="Mandante">
                            </div>
                            <div class="team-name text-truncate w-100" th:title="${p.mandante?.nome}" th:text="${p.mandante?.nome ?: 'A Definir'}">Time A</div>
                        </div>

                        <div class="d-flex align-items-center justify-content-center gap-2" style="width: 30%;">
                            <span class="fs-3 fw-bold text-primary-custom" th:text="${p.status?.name() == 'ENCERRADA' ? (p.golsMandante != null ? p.golsMandante : 0) : '-'}">-</span>
                            <span class="fw-bolder text-secondary-custom fs-5 mx-1">X</span>
                            <span class="fs-3 fw-bold text-primary-custom" th:text="${p.status?.name() == 'ENCERRADA' ? (p.golsVisitante != null ? p.golsVisitante : 0) : '-'}">-</span>
                        </div>

                        <div class="d-flex flex-column align-items-center" style="width: 35%;">
                            <div class="flag-box">
                                <img th:if="${p.visitante?.escudoUrl != null}" th:src="${p.visitante.escudoUrl}" alt="Visitante">
                            </div>
                            <div class="team-name text-truncate w-100" th:title="${p.visitante?.nome}" th:text="${p.visitante?.nome ?: 'A Definir'}">Time B</div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-end mb-4 px-2">
                        <div>
                            <div class="text-secondary-custom small mb-1">Data: <span class="text-primary-custom" th:text="${p.dataHora != null ? #temporals.format(p.dataHora, 'dd/MM/yyyy HH:mm') : 'A definir'}">--/--/--</span></div>
                            <div class="text-secondary-custom small mb-1">Fase: <span class="text-cyan fw-bold" th:text="${p.fase != null ? p.fase.descricao : '---'}">---</span></div>
                        </div>
                        <div class="text-end">
                            <span class="badge rounded-pill"
                                  th:classappend="${p.status?.name() == 'ENCERRADA' ? 'bg-success' : (p.status?.name() == 'EM_ANDAMENTO' ? 'bg-warning text-dark' : 'bg-info text-dark')}"
                                  th:text="${p.status != null ? p.status : 'SEM STATUS'}">STATUS</span>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between gap-2 mt-auto">
                        <a th:href="@{/partidas/{id}/resultado(id=${p.id})}" class="btn btn-sm btn-result rounded-pill flex-grow-1">Resultado</a>
                        <a th:href="@{/partidas/{id}(id=${p.id})}" class="btn btn-sm btn-edit rounded-pill px-3">Editar</a>
                        <a th:href="@{/partidas/remover/{id}(id=${p.id})}" class="btn btn-sm btn-delete rounded-pill px-3" onclick="return confirm('Excluir partida?');">Remover</a>
                    </div>

                </div>
            </div>

        </div>

        <div th:if="${#lists.isEmpty(partidas)}" class="text-center mt-5">
            <p class="text-secondary-custom fs-5">Nenhuma partida encontrada com estes filtros.</p>
        </div>

    </div>
</section>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
    <h1 class="mb-3">Partidas</h1>
    <a th:href="@{/partidas/novo}" class="btn btn-primary mb-3">Nova partida</a>
    <table class="table table-striped">
        <thead>
        <tr><th>ID</th><th>Confronto</th><th>Data/Hora</th><th>Fase</th><th>Status</th><th>Ações</th></tr>
        </thead>
        <tbody>
        <tr th:each="p : ${partidas}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.mandante.nome} + ' x ' + ${p.visitante.nome}"></td>
            <td th:text="${#temporals.format(p.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${p.fase}"></td>
            <td th:text="${p.status}"></td>
            <td>
                <a th:href="@{/partidas/{id}(id=${p.id})}" class="btn btn-sm btn-secondary">Editar</a>
                <a th:href="@{/partidas/remover/{id}(id=${p.id})}" class="btn btn-sm btn-danger">Remover</a>
            </td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>

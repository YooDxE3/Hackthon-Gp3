<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
    <style>
        @media (min-width: 992px) { .dash-container { max-width: 800px; margin: 0 auto; } }

        .card-custom { background-color: #2A1B4E !important; border: none; border-radius: 12px; }
        .text-primary-custom { color: #FFFFFF !important; }
        .text-secondary-custom { color: #E5E7EB !important; }

        .form-control-custom, .form-select-custom {
            background-color: #1F1135;
            border: 1px solid #334155;
            color: #FFFFFF;
            border-radius: 8px;
            padding: 12px;
        }
        .form-control-custom:focus, .form-select-custom:focus {
            background-color: #1F1135;
            color: #FFFFFF;
            border-color: #00C2C7;
            box-shadow: none;
        }

        /* Ajuste do ícone do calendário para ficar visível no fundo escuro */
        ::-webkit-calendar-picker-indicator { filter: invert(1); }

        .btn-success-custom { background-color: #A9D700; color: #1F1135; font-weight: bold; border: none; transition: 0.2s;}
        .btn-success-custom:hover { background-color: #8db500; color: #1F1135; transform: translateY(-2px); }

        .btn-secondary-custom { background-color: transparent; border: 1px solid #E5E7EB; color: #E5E7EB; transition: 0.2s;}
        .btn-secondary-custom:hover { background-color: #E5E7EB; color: #1F1135; }
    </style>

    <div class="dash-container">

        <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
            <h1 class="h3 fw-bold text-primary-custom">Agendamento de Partida</h1>
        </div>

        <div class="card card-custom shadow-sm">
            <div class="card-body p-4 p-md-5">

                <form th:action="@{/partidas/salvar}" th:object="${partida}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">Mandante</label>
                            <select class="form-select form-select-custom" th:field="*{mandante.id}" required>
                                <option value="">Selecione...</option>
                                <option th:each="s : ${selecoes}" th:value="${s.id}" th:text="${s.nome}"></option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">Visitante</label>
                            <select class="form-select form-select-custom" th:field="*{visitante.id}" required>
                                <option value="">Selecione...</option>
                                <option th:each="s : ${selecoes}" th:value="${s.id}" th:text="${s.nome}"></option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">Data e Hora</label>
                            <input type="datetime-local" class="form-control form-control-custom" th:field="*{dataHora}" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">Estádio</label>
                            <input type="text" class="form-control form-control-custom" th:field="*{estadio}" required placeholder="Ex: Maracanã">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">Fase</label>
                            <select class="form-select form-select-custom" th:field="*{fase}" required>
                                <option value="">Selecione...</option>
                                <option th:each="f : ${fases}" th:value="${f}" th:text="${f}"></option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">Grupo</label>
                            <input type="text" class="form-control form-control-custom" th:field="*{grupo}" maxlength="2" placeholder="Ex: G">
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-3 mt-5">
                        <a th:href="@{/partidas}" class="btn btn-secondary-custom rounded-pill px-4 py-2">Cancelar</a>
                        <button type="submit" class="btn btn-success-custom rounded-pill px-5 py-2">Salvar</button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</section>
</body>
</html>

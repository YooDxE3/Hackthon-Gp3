<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Partida</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
<h1 class="mb-3">Partida</h1>
<form th:action="@{/partidas/salvar}" th:object="${partida}" method="post">
    <input type="hidden" th:field="*{id}">
    <div class="mb-3">
        <label class="form-label">Mandante</label>
        <select class="form-select" th:field="*{mandante.id}">
            <option value="">Selecione...</option>
            <option th:each="s : ${selecoes}" th:value="${s.id}" th:text="${s.nome}"></option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Visitante</label>
        <select class="form-select" th:field="*{visitante.id}">
            <option value="">Selecione...</option>
            <option th:each="s : ${selecoes}" th:value="${s.id}" th:text="${s.nome}"></option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Data e hora</label>
        <input type="datetime-local" class="form-control" th:field="*{dataHora}">
    </div>
    <div class="mb-3">
        <label class="form-label">Estadio</label>
        <input type="text" class="form-control" th:field="*{estadio}">
    </div>
    <div class="mb-3">
        <label class="form-label">Fase</label>
        <select class="form-select" th:field="*{fase}">
            <option value="">Selecione...</option>
            <option th:each="f : ${fases}" th:value="${f}" th:text="${f}"></option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Grupo</label>
        <input type="text" class="form-control" th:field="*{grupo}" maxlength="2">
    </div>
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a th:href="@{/partidas}" class="btn btn-secondary">Cancelar</a>
</form>
</body>
</html>

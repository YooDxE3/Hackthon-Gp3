<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
  <style>
    /* --- APLICAÇÃO DO GUIA DE ESTILOS --- */
    @media (min-width: 992px) {
        .dash-container { max-width: 1200px; margin: 0 auto; }
    }

    .card-custom { background-color: #2A1B4E !important; border: none; border-radius: 12px; }
    .text-primary-custom { color: #FFFFFF !important; }
    .text-secondary-custom { color: #E5E7EB !important; }
    .text-cyan { color: #00C2C7 !important; }
    .text-green { color: #A9D700 !important; }

    /* Botões padronizados */
    .btn-success-custom { background-color: #A9D700; color: #1F1135; border: none; transition: 0.2s; }
    .btn-success-custom:hover { background-color: #8db500; color: #1F1135; transform: translateY(-2px); }

    .btn-danger-custom { background-color: transparent; border: 1px solid #E60000; color: #E60000; transition: 0.2s; }
    .btn-danger-custom:hover { background-color: #E60000; color: #FFFFFF; }

    /* Box de Informações de Pontuação */
    .score-box {
        background-color: #1F1135;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 10px;
    }

    /* Foto de Perfil */
    .avatar-container {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        border: 3px solid #00C2C7;
        overflow: hidden;
        margin: 0 auto;
        background-color: #1F1135;
        box-shadow: 0 4px 10px rgba(0, 194, 199, 0.3);
    }
    .avatar-container img { width: 100%; height: 100%; object-fit: cover; }
  </style>

  <div class="dash-container">

    <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
      <h1 class="h3 fw-bold text-primary-custom">Gestão de Usuários</h1>
      <span class="badge bg-cyan text-dark px-3 py-2 rounded-pill fs-6">
                Total: <span th:text="${#lists.size(usuarios)}">0</span>
            </span>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4">

      <div class="col" th:each="u : ${usuarios}">
        <div class="card card-custom h-100 shadow-sm p-4 text-center position-relative">

                    <span class="position-absolute top-0 end-0 m-3 badge rounded-pill"
                          th:classappend="${u.bloqueado ? 'bg-danger' : 'bg-success'}"
                          th:text="${u.bloqueado ? 'Bloqueado' : 'Ativo'}">
                    </span>

          <span class="position-absolute top-0 start-0 m-3 badge bg-secondary rounded-pill" th:text="${u.perfil}">
                    </span>

          <div class="avatar-container mb-3 mt-2">
            <img th:if="${u.avatarUrl != null and !u.avatarUrl.isEmpty()}" th:src="${u.avatarUrl}" alt="Avatar">

            <img th:unless="${u.avatarUrl != null and !u.avatarUrl.isEmpty()}"
                 th:src="@{'https://ui-avatars.com/api/?name=' + ${u.nome} + '&background=1F1135&color=00C2C7&bold=true&size=150'}"
                 alt="Avatar Placeholder">
          </div>

          <h5 class="fw-bold text-primary-custom mb-1 text-truncate" th:title="${u.nome}" th:text="${u.nome}">Nome do Usuário</h5>
          <p class="text-secondary-custom small mb-4 text-truncate" th:title="${u.email}" th:text="${u.email}">email@exemplo.com</p>

          <div class="score-box d-flex justify-content-around mb-4">
            <div>
              <div class="small text-secondary-custom text-uppercase fw-bold" style="font-size: 0.7rem;">Pontos</div>
              <div class="fw-bold text-cyan fs-5" th:text="${u.pontuacaoTotal}">0</div>
            </div>
            <div class="border-end border-secondary"></div>
            <div>
              <div class="small text-secondary-custom text-uppercase fw-bold" style="font-size: 0.7rem;">Cravados</div>
              <div class="fw-bold text-green fs-5" th:text="${u.placaresExatos}">0</div>
            </div>
          </div>

          <div class="mt-auto">
            <form th:if="${#authentication.name != u.email}"
                  th:action="@{/usuarios/{id}/bloqueio(id=${u.id})}"
                  method="post" class="w-100">

              <button type="submit"
                      class="btn w-100 rounded-pill fw-bold py-2"
                      th:classappend="${u.bloqueado ? 'btn-success-custom' : 'btn-danger-custom'}"
                      th:text="${u.bloqueado ? 'Desbloquear Acesso' : 'Bloquear Usuário'}">
              </button>
            </form>

            <div th:unless="${#authentication.name != u.email}" class="text-secondary-custom small fst-italic py-2 border border-secondary rounded-pill border-opacity-25">
              Seu Perfil Atual
            </div>
          </div>

        </div>
      </div>

    </div>

  </div>
</section>
</body>
</html>

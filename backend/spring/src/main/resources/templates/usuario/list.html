<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
  <style>
    /* --- APLICAÇÃO DO TEMA CLARO --- */
    @media (min-width: 992px) {
        .dash-container { max-width: 1200px; margin: 0 auto; }
    }

    /* Superfícies e Textos */
    .card-custom {
        background-color: #F8F9FA !important;
        border: 1px solid #E5E7EB;
        border-radius: 12px;
    }
    .text-primary-custom { color: #1F2937 !important; }
    .text-secondary-custom { color: #6B7280 !important; }
    .text-cyan { color: #009B9F !important; }
    .text-green { color: #83A600 !important; }

    .border-cyan { border-color: #009B9F !important; }

    /* Botões padronizados */
    .btn-cyan { background-color: #00C2C7; color: #1F1135; font-weight: bold; border: none; transition: 0.2s; }
    .btn-cyan:hover { background-color: #009b9f; color: #1F1135; transform: translateY(-2px); }

    .btn-success-custom { background-color: #A9D700; color: #1F1135; border: none; transition: 0.2s; }
    .btn-success-custom:hover { background-color: #8db500; color: #1F1135; transform: translateY(-2px); }

    .btn-danger-custom { background-color: transparent; border: 1px solid #DC2626; color: #DC2626; transition: 0.2s; }
    .btn-danger-custom:hover { background-color: #DC2626; color: #FFFFFF; }

    .btn-outline-danger { border: 1px solid #DC2626; color: #DC2626; transition: 0.2s; }
    .btn-outline-danger:hover { background-color: #DC2626; color: #FFFFFF; }

    /* Box de Informações de Pontuação Claro */
    .score-box {
        background-color: #FFFFFF;
        border: 1px solid #D1D5DB;
        border-radius: 8px;
        padding: 10px;
    }

    /* Foto de Perfil */
    .avatar-container {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        border: 3px solid #009B9F;
        overflow: hidden;
        margin: 0 auto;
        background-color: #FFFFFF;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }
    .avatar-container img { width: 100%; height: 100%; object-fit: cover; }
  </style>

  <div class="dash-container">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 mt-2 gap-3">
      <h1 class="h3 fw-bold text-primary-custom mb-0">Gestão de Usuários</h1>

      <div class="d-flex align-items-center gap-3">
        <span class="badge bg-cyan text-dark px-3 py-2 rounded-pill fs-6">
            Total: <span th:text="${#lists.size(usuarios)}">0</span>
        </span>
        <a th:href="@{/usuarios/novo}" class="btn btn-cyan rounded-pill px-4">Novo Administrador</a>
      </div>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4">

      <div class="col" th:each="u : ${usuarios}">
        <div class="card card-custom h-100 shadow-sm p-4 text-center position-relative">

          <span class="position-absolute top-0 end-0 m-3 badge rounded-pill"
                th:classappend="${u.bloqueado ? 'bg-danger' : 'bg-success'}"
                th:text="${u.bloqueado ? 'Bloqueado' : 'Ativo'}">
          </span>

          <span class="position-absolute top-0 start-0 m-3 badge bg-secondary rounded-pill" th:text="${u.perfil}">
          </span>

          <div class="avatar-container mb-3 mt-2">
            <img th:if="${u.avatarUrl != null and !u.avatarUrl.isEmpty()}" th:src="${u.avatarUrl}" alt="Avatar">
            <img th:unless="${u.avatarUrl != null and !u.avatarUrl.isEmpty()}"
                 th:src="@{'https://ui-avatars.com/api/?name=' + ${u.nome} + '&background=F8F9FA&color=009B9F&bold=true&size=150'}"
                 alt="Avatar Placeholder">
          </div>

          <h5 class="fw-bold text-primary-custom mb-1 text-truncate" th:title="${u.nome}" th:text="${u.nome}">Nome</h5>
          <p class="text-secondary-custom small mb-4 text-truncate" th:title="${u.email}" th:text="${u.email}">email</p>

          <div class="score-box d-flex justify-content-around mb-4">
            <div>
              <div class="small text-secondary-custom text-uppercase fw-bold" style="font-size: 0.7rem;">Pontos</div>
              <div class="fw-bold text-cyan fs-5" th:text="${u.pontuacaoTotal}">0</div>
            </div>
            <div class="border-end border-secondary border-opacity-25"></div>
            <div>
              <div class="small text-secondary-custom text-uppercase fw-bold" style="font-size: 0.7rem;">Cravados</div>
              <div class="fw-bold text-green fs-5" th:text="${u.placaresExatos}">0</div>
            </div>
          </div>

          <!-- BLOCO ÚNICO DE AÇÕES CORRIGIDO -->
          <div class="mt-auto">

            <!-- Caso 1: Próprio usuário logado -->
            <div th:if="${#authentication.name == u.email}" class="text-secondary-custom small fst-italic py-2 border border-secondary rounded-pill border-opacity-25">
              Seu Perfil Atual
            </div>

            <!-- Caso 2: Outros usuários -->
            <div th:if="${#authentication.name != u.email}">

              <!-- Aviso de Administrador -->
              <div th:if="${u.perfil.name() == 'ADMIN'}" class="text-cyan small fw-bold py-2 border border-cyan rounded-pill border-opacity-25 mb-2">
                Administrador
              </div>

              <div class="d-flex gap-2 w-100 mt-2">
                <!-- Form de Bloqueio (Só renderiza para USER) -->
                <form th:if="${u.perfil.name() == 'USER'}" th:action="@{/usuarios/{id}/bloqueio(id=${u.id})}" method="post" class="flex-grow-1 m-0">
                  <button type="submit"
                          class="btn w-100 rounded-pill fw-bold py-2 small"
                          th:classappend="${u.bloqueado ? 'btn-success-custom' : 'btn-danger-custom'}"
                          th:text="${u.bloqueado ? 'Desbloquear' : 'Bloquear'}">
                  </button>
                </form>

                <!-- Botão de Excluir que aciona o Modal Customizado -->
                <button type="button"
                        class="btn btn-outline-danger rounded-pill fw-bold py-2 px-3"
                        th:classappend="${u.perfil.name() == 'ADMIN' ? 'w-100' : ''}"
                        th:attr="onclick=|abrirModalExclusao('${u.id}', '${u.nome}')|">
                  Excluir
                </button>
              </div>
            </div>

          </div>
          <!-- FIM DO BLOCO DE AÇÕES -->

        </div>
      </div>

    </div>

  </div>

  <!-- MODAL CUSTOMIZADO DE EXCLUSÃO -->
  <div class="modal fade" id="modalExclusao" tabindex="-1" aria-labelledby="modalExclusaoLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="background-color: #F8F9FA; border: 1px solid #E5E7EB; border-radius: 12px;">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title text-danger fw-bold" id="modalExclusaoLabel">Atenção</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body text-primary-custom">
          Tem certeza que deseja excluir permanentemente o usuário <strong id="nomeUsuarioModal"></strong> e todos os seus dados?<br><br>Esta ação não poderá ser desfeita.
        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
          <a href="#" id="btnConfirmarExclusao" class="btn btn-danger rounded-pill px-4 fw-bold">Sim, Excluir</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Função para alimentar e abrir o modal de exclusão
    function abrirModalExclusao(id, nome) {
        document.getElementById('nomeUsuarioModal').textContent = nome;
        document.getElementById('btnConfirmarExclusao').href = '/usuarios/remover/' + id;

        var modal = new bootstrap.Modal(document.getElementById('modalExclusao'));
        modal.show();
    }
  </script>

</section>
</body>
</html>

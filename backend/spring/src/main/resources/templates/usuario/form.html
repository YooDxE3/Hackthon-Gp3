<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
    <style>
        @media (min-width: 992px) { .dash-container { max-width: 800px; margin: 0 auto; } }

        /* Superfícies e Textos (Tema Claro) */
        .card-custom {
            background-color: #F8F9FA !important;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
        }

        .text-primary-custom { color: #1F2937 !important; } /* Cinza Escuro */
        .text-secondary-custom { color: #6B7280 !important; } /* Cinza Médio */

        /* Inputs claros com borda Ciano no foco */
        .form-control-custom, .form-select-custom {
            background-color: #FFFFFF;
            border: 1px solid #D1D5DB;
            color: #1F2937;
            border-radius: 8px;
            padding: 12px;
        }

        .form-control-custom:focus, .form-select-custom:focus {
            background-color: #FFFFFF;
            color: #1F2937;
            border-color: #009B9F;
            box-shadow: 0 0 0 0.25rem rgba(0, 194, 199, 0.15);
            outline: none;
        }

        .form-control-custom::placeholder {
            color: #9CA3AF;
        }

        /* Botões */
        .btn-success-custom { background-color: #A9D700; color: #1F1135; font-weight: bold; border: none; transition: 0.2s;}
        .btn-success-custom:hover { background-color: #8db500; color: #1F1135; transform: translateY(-2px); }

        .btn-secondary-custom { background-color: transparent; border: 1px solid #6B7280; color: #6B7280; transition: 0.2s;}
        .btn-secondary-custom:hover { background-color: #6B7280; color: #FFFFFF; }
    </style>

    <div class="dash-container">

        <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
            <h1 class="h3 fw-bold text-primary-custom">Novo Usuário</h1>
        </div>

        <div class="card card-custom shadow-sm">
            <div class="card-body p-4 p-md-5">

                <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">

                    <div class="row g-4">
                        <div class="col-md-12">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">Nome Completo</label>
                            <input type="text" class="form-control form-control-custom" th:field="*{nome}" required placeholder="Ex: Administrador Geral">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">E-mail (Login)</label>
                            <input type="email" class="form-control form-control-custom" th:field="*{email}" required placeholder="admin@bolao.com">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">Senha Temporária</label>
                            <input type="password" class="form-control form-control-custom" th:field="*{senha}" required placeholder="Crie uma senha de acesso">
                        </div>

                        <div class="col-md-8">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">Foto de Perfil (URL Opcional)</label>
                            <input type="url" class="form-control form-control-custom" th:field="*{avatarUrl}" placeholder="https://link.com/foto.png">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label text-secondary-custom fw-bold small text-uppercase">Nível de Acesso</label>
                            <select class="form-select form-select-custom" th:field="*{perfil}" required>
                                <option value="ADMIN">Administrador</option>
                                <option value="USER">Usuário Comum</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-3 mt-5">
                        <a th:href="@{/usuarios}" class="btn btn-secondary-custom rounded-pill px-4 py-2">Cancelar</a>
                        <button type="submit" class="btn btn-success-custom rounded-pill px-5 py-2">Criar Conta</button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</section>
</body>
</html>
